<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset="UTF-8">
  <meta name='viewport' content="width=device-width, initial-scale=1.0" />
  <title>RAT</title>
  <link rel='stylesheet' href="./rat.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hubot+Sans:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
</head>
<body class='mobilefix'>
  
  <svg style="display: none;">
    <filter id="wave-shader">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="20" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </svg>

  <div id='welcome'>
    <div id='logo' data-animate='vibrate' style='filter: url(#wave-shader);'>
      <img src='./logo.webp' />
      <div class='name'>RAT</div>
      <div class='sub'>version: 0.1.0</div>
    </div>
  </div>
  
</body>
</html>
